  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ices\" style=\"border: 1.5px solid rgba(255,255,255,0.32); color: #f4f6fb; font-weight: 600; font-size: 16.5px; padding: 15px 28px; border-radius: 10px; text-decoration: none;\">Explore Services<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 20px; font-family: 'Sora', sans-serif; font-size: 13.5px; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(158,205,255,0.85); font-weight: 700;\">\n        Operator-led &nbsp;•&nbsp; Security-conscious &nbsp;•&nbsp; Pilot-first &nbsp;•&nbsp; HubSpot &amp; Salesforce fluent\n      <\u002Fdiv>\n      <div style=\"font-size: 15.5px; color: rgba(244,246,251,0.65);\">\n        For B2B SaaS and growth-stage teams using HubSpot, Salesforce, and modern GTM systems.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"max-width: 1240px; margin: 0 auto; height: 1px; background: rgba(255,255,255,0.08);\"><\u002Fdiv>\n\n    <section style=\"max-width: 1160px; margin: 0 auto; padding: 110px 32px 100px;\">\n      <div style=\"text-align: center; max-width: 780px; margin: 0 auto;\">\n        <h2 style=\"font-family: 'Sora', sans-serif; font-size: 38px; font-weight: 800; line-height: 1.25; margin: 0 0 20px;\">\n          Your team knows AI can help. But knowing and doing are different problems.\n        <\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.7; color: rgba(244,246,251,0.75); margin: 0;\">\n          Most revenue teams are stuck between AI hype and day-to-day execution. The gap isn't interest — it's implementation that fits your CRM, your process, and your team's capacity.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; margin-top: 64px;\">\n        <sc-for list=\"{{ problemCards }}\" as=\"card\" hint-placeholder-count=\"3\">\n          <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px 28px; box-shadow: 0 0 0 1px rgba(34,211,238,0  <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"max-width: 1240px; margin: 0 auto; height: 1px; background: rgba(255,255,255,0.08);\"><\u002Fdiv>\n\n    <section id=\"services\" style=\"max-width: 1160px; margin: 0 auto; padding: 110px 32px 90px;\">\n      <h2 style=\"font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 800; text-align: center; max-width: 780px; margin: 0 auto 56px; line-height: 1.3;\">\n        AI workflows designed for how revenue teams actually operate.\n      <\u002Fh2>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 24px;\">\n        <sc-for list=\"{{ serviceCards }}\" as=\"svc\" hint-placeholder-count=\"3\">\n          <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 34px 28px; display: flex; flex-direction: column; gap: 16px;\">\n            <div style=\"width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, rgba(47,107,255,0.28), rgba(34,211,238,0.22)); border: 1px solid rgba(124,199,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 20px;\">{{ svc.icon }}<\u002Fdiv>\n            <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20.5px; color: #f4f6fb;\">{{ svc.title }}<\u002Fdiv>\n            <div style=\"font-size: 16.5px; line-height: 1.7; color: rgba(244,246,251,0.85);\">{{ svc.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 44px;\">\n        <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"8\">\n          <div style=\"background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); color: rgba(244,246,251,0.92); font-size: 15.5px; font-weight: 500; padding: 10px 20px; border-radius: 999px;\">{{ chip }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"max-width: 1240px; margin: 0 auto; height: 1px; background: rgba(255,255,255,0.08);\"><\u002Fdiv>\n\n    <section id=\"approach\" style=\"max-width: 1160px; margin: 0 auto; padding: 110px 32px 90px;\">\n      <h2 style=\"font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 800; text-align: center; max-width: 760px; margin: 0 auto 56px;\">\n        A clear path from AI interest to working workflows.\n      <\u002Fh2>\n\n      <div class=\"ns-approach-grid\" style=\"display: grid; grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr; align-items: stretch; gap: 6px;\">\n        <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px 22px; display: flex; flex-direction: column; gap: 12px; min-width: 0;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 19.5px;\">Assess<\u002Fdiv>\n          <div style=\"font-size: 16px; line-height: 1.65; color: rgba(244,246,251,0.82);\">Audit your GTM stack, sales process, data quality, and manual workflows.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ns-approach-arrow\" style=\"display: flex; align-items: center; justify-content: center; color: #22d3ee; font-size: 24px; font-weight: 700;\">→<\u002Fdiv>\n        <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px 22px; display: flex; flex-direction: column; gap: 12px; min-width: 0;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 19.5px;\">Prioritize<\u002Fdiv>\n          <div style=\"font-size: 16px; line-height: 1.65; color: rgba(244,246,251,0.82);\">Select 1–3 AI use cases based on impact, feasibility, and adoption risk.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ns-approach-arrow\" style=\"display: flex; align-items: center; justify-content: center; color: #22d3ee; font-size: 24px; font-weight: 700;\">→<\u002Fdiv>\n        <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px 22px; display: flex; flex-direction: column; gap: 12px; min-width: 0;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 19.5px;\">Build<\u002Fdiv>\n          <div style=\"font-size: 16px; line-height: 1.65; color: rgba(244,246,251,0.82);\">Implement workflows inside your CRM, email, and approval systems.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ns-approach-arrow\" style=\"display: flex; align-items: center; justify-content: center; color: #22d3ee; font-size: 24px; font-weight: 700;\">→<\u002Fdiv>\n        <div style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px 22px; display: flex; flex-direction: column; gap: 12px; min-width: 0;\">\n          <div style=\"font-family: 'Sora', sans-serif; font-weight: 700; font-size: 19.5px;\">Measure<\u002Fdiv>\n          <div style=\"font-size: 16px; line-height: 1.65; color: rgba(244,246,251,0.82);\">Track adoption, output quality, time saved, and next-step roadmap.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div style=\"max-width: 1240px; margin: 0 auto; height: 1px; background: rgba(255,255,255,0.08);\"><\u002Fdiv>\n\n    <section id=\"contact\" style=\"max-width: 800px; margin: 0 auto; padding: 100px 24px 50px;\">\n      <div style=\"text-align: center; margin-bottom: 48px;\">\n        <h2 style=\"font-family: 'Sora', sans-serif; font-size: 34px; font-weight: 800; margin: 0 0 16px;\">Let's talk about what AI can do for your GTM team.<\u002Fh2>\n        <p style=\"font-size: 17.5px; line-height: 1.65; color: rgba(244,246,251,0.82); margin: 0;\">\n          30 minutes. No pitch deck. Just a practical conversation about where AI fits into your revenue operations.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <form style=\"background: #121a2c; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; display: flex; flex-direction: column; gap: 20px;\" onsubmit=\"{{ handleSubmit }}\" novalidate=\"{{ true }}\">\n        <input type=\"text\" name=\"companyWebsite\" value=\"{{ honeypot }}\" onchange=\"{{ onHoneypotChange }}\" tabindex=\"-1\" autocomplete=\"off\" aria-hidden=\"true\" style=\"position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;\">\n        <sc-if value=\"{{ hasErrors }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.5); color: #fca5a5; font-size: 14.5px; font-weight: 600; padding: 12px 16px; border-radius: 10px;\">Please fix the highlighted fields below.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ throttleMessage }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background: rgba(234,179,8,0.12); border: 1px solid rgba(234,179,8,0.5); color: #fde68a; font-size: 14.5px; font-weight: 600; padding: 12px 16px; border-radius: 10px;\">{{ throttleMessage }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px;\">\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n            Name\n            <input type=\"text\" placeholder=\"Jane Smith\" value=\"{{ name }}\" onchange=\"{{ onNameChange }}\" style=\"{{ nameInputStyle }}\" maxlength=\"100\">\n            <sc-if value=\"{{ nameError }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size: 13px; color: #f87171; font-weight: 600;\">{{ nameError }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Flabel>\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n            Business email\n            <input type=\"email\" placeholder=\"jane@company.com\" value=\"{{ email }}\" onchange=\"{{ onEmailChange }}\" style=\"{{ emailInputStyle }}\" maxlength=\"254\">\n            <sc-if value=\"{{ emailError }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size: 13px; color: #f87171; font-weight: 600;\">{{ emailError }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px;\">\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n            Company\n            <input type=\"text\" placeholder=\"Company\" value=\"{{ company }}\" onchange=\"{{ onCompanyChange }}\" style=\"{{ companyInputStyle }}\" maxlength=\"150\">\n            <sc-if value=\"{{ companyError }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size: 13px; color: #f87171; font-weight: 600;\">{{ companyError }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Flabel>\n          <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n            Role / title\n            <input type=\"text\" placeholder=\"VP of Sales, RevOps Lead...\" value=\"{{ role }}\" onchange=\"{{ onRoleChange }}\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 13px 14px; color: #f4f6fb; font-size: 16px; font-family: inherit;\" maxlength=\"100\">\n          <\u002Flabel>\n        <\u002Fdiv>\n        <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n          What are you trying to improve?\n          <textarea placeholder=\"e.g. sales prep is slow, CRM data is messy, follow-up drops off...\" rows=\"5\" value=\"{{ message }}\" onchange=\"{{ onMessageChange }}\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 13px 14px; color: #f4f6fb; font-size: 16px; font-family: inherit; resize: vertical;\" maxlength=\"1500\"><\u002Ftextarea>\n          <span style=\"font-size: 12.5px; color: rgba(244,246,251,0.5);\">{{ messageCount }}<\u002Fspan>\n        <\u002Flabel>\n        <label style=\"display: flex; flex-direction: column; gap: 8px; font-size: 14.5px; font-weight: 600; color: rgba(244,246,251,0.82);\">\n          Timing\n          <select value=\"{{ timing }}\" onchange=\"{{ onTimingChange }}\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 13px 14px; color: #f4f6fb; font-size: 16px; font-family: inherit;\">\n            <option value=\"Now\">Now<\u002Foption>\n            <option value=\"Next 90 days\">Next 90 days<\u002Foption>\n            <option value=\"Later this year\">Later this year<\u002Foption>\n          <\u002Fselect>\n        <\u002Flabel>\n\n        <div class=\"cf-turnstile\" data-sitekey=\"0x4AAAAAADxr79VGYXMTNMBE\"><\u002Fdiv>\n        <sc-if value=\"{{ captchaError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size: 13px; color: #f87171; font-weight: 600;\">{{ captchaError }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <button type=\"submit\" style=\"margin-top: 8px; background: linear-gradient(135deg,#3b82ff,#22d3ee); color: #051022; font-weight: 700; font-size: 16.5px; padding: 17px; border-radius: 10px; border: none; cursor: pointer; box-shadow: 0 10px 34px rgba(59,130,255,0.45);\">Request a Business Meeting →<\u002Fbutton>\n        <sc-if value=\"{{ submitSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align: center; font-size: 14.5px; color: #7fe0a8; font-weight: 600;\">Thanks for reaching out to Northstar GTM AI. We received your request and will follow up if there is a fit.<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"text-align: center; font-size: 14.5px; color: rgba(244,246,251,0.65);\">We'll follow up to schedule a short working session, not a sales pitch.<\u002Fdiv>\n        <div style=\"text-align: center; font-size: 13px; line-height: 1.6; color: rgba(244,246,251,0.5); border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px; margin-top: 4px;\">\n          By submitting this form, you agree that Northstar GTM AI may use the information provided to respond to your inquiry. Please do not submit confidential or sensitive information through this form.\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fsection>\n\n    <footer style=\"border-top: 1px solid rgba(255,255,255,0.1); padding: 32px 24px;\">\n      <div style=\"max-width: 1160px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;\">\n        <div style=\"display: flex; align-items: center; gap: 14px;\">\n          <div>\n            <div style=\"font-family: 'Sora', sans-serif; font-weight: 800; font-size: 16px; color: #f4f6fb; letter-spacing: 0.02em;\">NORTHSTAR GTM AI LLC<\u002Fdiv>\n            <div style=\"font-size: 15px; color: rgba(244,246,251,0.78); margin-top: 4px;\">Practical AI systems for modern Go-To-Market teams.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align: center;\">\n          <div style=\"font-size: 15px; color: rgba(244,246,251,0.88); display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;\">\n            <span>northstargtmai.com &nbsp;|&nbsp; hello@northstargtmai.com<\u002Fspan>\n            <a href=\"https://www.linkedin.com/company/northstar-gtm-ai\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Northstar GTM AI on LinkedIn\" style=\"display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); flex-shrink: 0;\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"rgba(244,246,251,0.85)\"><path d=\"M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.14 1.45-2.14 2.94v5.66H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z\"/><\u002Fsvg>\n            <\u002Fa>\n          <\u002Fdiv>\n          <div style=\"font-size: 13.5px; color: rgba(244,246,251,0.62); margin-top: 4px;\">© 2026 Northstar GTM AI LLC. All rights reserved.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n// Apps Script Web App URL from apps-script/Code.gs deployment. Token must\n// match SHARED_TOKEN in Code.gs.\nconst GAS_WEB_APP_URL = \"https://script.google.com/macros/s/AKfycbxcmdQqmJKh2VYNWqT6WDmt-CKy5FKVamuyEW6yoKB-wVPITsLG-x3EyMQL1J0vx9wL0g/exec\";\nconst GAS_SHARED_TOKEN = \"vDhdhHev-x8lEOgqsfGrM7MCrPZznSDr\";\n\nclass Component extends DCLogic {\n  state = {\n    name: \"\",\n    email: \"\",\n    company: \"\",\n    role: \"\",\n    message: \"\",\n    timing: \"Now\",\n    honeypot: \"\",\n    lastSubmitAt: 0,\n    errors: {},\n    submitSuccess: false\n  };\n\n  // Per-field character caps (mirrors the maxLength attrs so pasted text is\n  // trimmed even if a client bypasses the DOM attribute).\n  maxLengths = { name: 100, email: 254, company: 150, role: 100, message: 1500 };\n\n  // Strip characters that enable HTML/script injection, drop bare URLs, and\n  // cap length per field — a simple allowlist-style client-side guard.\n  // (Real protection still requires server-side validation once this form\n  // is wired to a backend — see note in handleSubmit.)\n  sanitize(raw, field) {\n    if (typeof raw !== \"string\") return \"\";\n    const max = this.maxLengths[field] || 300;\n    return raw\n      .replace(/<[^>]*>/g, \"\")\n      .replace(/javascript:/gi, \"\")\n      .replace(/[<>]/g, \"\")\n      .slice(0, max);\n  }\n\n  makeChangeHandler(field) {\n    return (e) => {\n      const clean = this.sanitize(e.target.value, field);\n      this.setState((s) => ({\n        [field]: clean,\n        errors: { ...s.errors, [field]: undefined }\n      }));\n    };\n  }\n\n  fieldStyle(hasError) {\n    const base = \"background: rgba(255,255,255,0.06); border-radius: 10px; padding: 13px 14px; color: #f4f6fb; font-size: 16px; font-family: inherit; border: 1px solid \";\n    return base + (hasError ? \"#ef4444; box-shadow: 0 0 0 1px rgba(239,68,68,0.35);\" : \"rgba(255,255,255,0.2);\");\n  }\n\n  renderVals() {\n    const { name, email, company, role, message, timing, honeypot, errors, submitSuccess } = this.state;\n    return {\n      name, email, company, role, message, timing, honeypot,\n      messageCount: message.length + \" / 1500\",\n      nameError: errors.name || \"\",\n      emailError: errors.email || \"\",\n      companyError: errors.company || \"\",\n      hasErrors: !!(errors.name || errors.email || errors.company),\n      throttleMessage: errors.form || \"\",\n      captchaError: errors.captcha || \"\",\n      nameInputStyle: this.fieldStyle(!!errors.name),\n      emailInputStyle: this.fieldStyle(!!errors.email),\n      companyInputStyle: this.fieldStyle(!!errors.company),\n      submitSuccess,\n      onNameChange: this.makeChangeHandler(\"name\"),\n      onEmailChange: this.makeChangeHandler(\"email\"),\n      onCompanyChange: this.makeChangeHandler(\"company\"),\n      onRoleChange: this.makeChangeHandler(\"role\"),\n      onMessageChange: this.makeChangeHandler(\"message\"),\n      onHoneypotChange: (e) => this.setState({ honeypot: e.target.value }),\n      onTimingChange: (e) => this.setState({ timing: this.sanitize(e.target.value, \"timing\") }),\n      problemCards: [\n        { title: \"From AI Hype to GTM Execution\", body: \"We ting and duplicate/spam-score\n        // blocking has to happen server-side (e.g. Cloudflare Turnstile +\n        // a form backend) once this is wired to a live endpoint.\n        const now = Date.now();\n        if (now - this.state.lastSubmitAt < 15000) {\n          this.setState({ errors: { form: \"Please wait a moment before submitting again.\" } });\n          return;\n        }\n\n        const emailPattern = /^[^\\s@<>]+@[^\\s@<>]+\\.[^\\s@<>]+$/;\n        const nextErrors = {};\n        if (!this.state.name.trim()) nextErrors.name = \"Name is required.\";\n        if (!this.state.company.trim()) nextErrors.company = \"Company is required.\";\n        const emailVal = this.state.email.trim();\n        if (!emailVal) {\n          nextErrors.email = \"Business email is required.\";\n        } else if (!emailPattern.test(emailVal)) {\n          nextErrors.email = \"Enter a valid email address.\";\n        }\n        const turnstileInput = document.querySelector('[name=\"cf-turnstile-response\"]');\n        const turnstileToken = turnstileInput ? turnstileInput.value : \"\";\n        if (!turnstileToken) {\n          nextErrors.captcha = \"Verification is still loading — please wait a moment and try again.\";\n        }\n\n        const ok = Object.keys(nextErrors).length === 0;\n        this.setState({ errors: nextErrors, submitSuccess: ok, lastSubmitAt: ok ? now : this.state.lastSubmitAt });\n        if (!ok) return;\n\n        // Fire-and-forget to the Apps Script web app. mode: \"no-cors\" is\n        // required because Apps Script doesn't return CORS headers for\n        // fetch; that also means the response body/status can't be read\n        // here, so success is shown optimistically once the request is\n        // sent. Real spam/rate-limit enforcement happens server-side in\n        // Code.gs (shared token + honeypot + per-email throttle + Turnstile\n        // verification) since a static frontend can't enforce any of that.\n        fetch(GAS_WEB_APP_URL, {\n          method: \"POST\",\n          mode: \"no-cors\",\n          headers: { \"Content-Type\": \"text/plain;charset=utf-8\" },\n          body: JSON.stringify({\n            token: GAS_SHARED_TOKEN,\n            turnstileToken,\n            name: this.state.name,\n            email: this.state.email,\n            company: this.state.company,\n            role: this.state.role,\n            message: this.state.message,\n            timing: this.state.timing,\n            honeypot: this.state.honeypot\n          })\n        }).catch(() => {});\n\n        if (window.turnstile) window.turnstile.reset();\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n<script src=\"https://challenges.cloudflare.com/turnstile/v0/api.js\" async defer><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
